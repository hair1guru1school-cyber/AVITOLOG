<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVITOBO$$</title>
<link rel="icon" href="icon.png?v=3" type="image/png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Golos+Text:wght@400;500;600;700;900&display=swap');
:root{--bg:#0c0c0e;--surface:#141416;--surface2:#1c1c1f;--border:#2a2a2e;--accent:#00d97e;--accent2:#ff6b35;--accent3:#7c6af7;--text:#ebebeb;--muted:#666;--muted2:#333}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Golos Text',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#driveSplash{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#0c0c0e;overflow:hidden}
#driveSplash .splash-bg{position:absolute;top:0;left:0;width:100vw;height:100vh;min-width:100vw;min-height:100vh;object-fit:cover;object-position:center;display:block;z-index:0}
#driveSplash::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.65);pointer-events:none;z-index:1}
#driveSplash .splash-btn{position:relative;z-index:2;padding:18px 48px;font-size:18px;font-weight:900;border-radius:12px;border:2px solid var(--accent);background:rgba(0,217,126,0.15);color:var(--accent);cursor:pointer;font-family:'Golos Text',sans-serif;letter-spacing:2px;transition:all 0.25s;animation:driveBreatheBig 2.5s ease-in-out infinite}
#driveSplash .splash-btn:hover{background:var(--accent);color:#0c0c0e;transform:scale(1.05);animation:none;box-shadow:0 0 30px rgba(0,217,126,0.5)}
@keyframes driveBreatheBig{0%,100%{opacity:0.9}50%{opacity:1;box-shadow:0 0 20px rgba(0,217,126,0.3)}}
#mainApp{display:none}
#pgbar{position:fixed;top:0;left:0;right:0;height:3px;z-index:999;pointer-events:none}
#pgfill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent3));box-shadow:0 0 8px var(--accent);transition:width 0.4s ease}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 22px;display:flex;align-items:center;height:52px;position:sticky;top:3px;z-index:100;gap:12px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:5px;color:var(--accent);white-space:nowrap}
.layout{display:grid;grid-template-columns:340px 1fr 155px;height:calc(100vh - 55px)}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:14px;overflow-y:auto;display:flex;flex-direction:column}
.side-tabs{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.side-tab{display:flex;flex-direction:column;background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:10px;cursor:pointer;font-family:'Bebas Neue',sans-serif;transition:all 0.18s;width:100%;overflow:hidden;padding:0}
.side-tab:hover{border-color:#444;color:var(--text)}
.side-tab:active{transform:scale(0.98)}
.side-tab.active{color:var(--accent);background:rgba(0,217,126,0.06);border-color:rgba(0,217,126,0.35)}
.side-tab.done{color:var(--accent);background:rgba(0,217,126,0.1);border-color:var(--accent)}
.tab-inner{display:flex;align-items:center;gap:10px;padding:12px 14px}
.tab-ico{font-size:17px}
.tab-txt{font-size:17px;letter-spacing:2px}
.tab-loader{height:4px;width:100%;background:rgba(255,255,255,0.04);overflow:hidden}
.tab-bar{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent3));box-shadow:0 0 5px var(--accent)}
.sec{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;margin-top:14px}
.sec:first-of-type{margin-top:0}
.fg{margin-bottom:8px}
.fg label{display:block;font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
input[type=text],input[type=search],textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:7px;font-family:'Golos Text',sans-serif;font-size:13px;outline:none;transition:border-color 0.18s}
input[type=text]:focus,input[type=search]:focus,textarea:focus{border-color:var(--accent)}
input[type=search]{-webkit-appearance:none;appearance:none}
input[type=search]::-webkit-search-cancel-button{display:none}
textarea{resize:vertical;min-height:50px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.row3 .fg{margin-bottom:0}
.row2 .fg{margin-bottom:0}
.crm-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all 0.2s}
.badge.ok{border-color:var(--accent);color:var(--accent)}
.badge.err{border-color:#ff5050;color:#ff5050}
.badge .x{opacity:0.5;margin-left:2px;cursor:pointer}.badge .x:hover{opacity:1}
.client-menu{position:absolute;left:0;top:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;min-width:280px;max-height:340px;overflow:hidden;z-index:50;display:none;box-shadow:0 8px 24px rgba(0,0,0,0.4);flex-direction:column}
.client-menu.show{display:flex}
.cm-head{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--text)}
.cm-head .cm-close{cursor:pointer;color:var(--muted);font-size:14px}
.cm-head .cm-close:hover{color:var(--text)}
.cm-path{padding:4px 10px;font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-bottom:1px solid var(--border)}
.cm-tools{display:flex;gap:6px;padding:6px 10px;border-bottom:1px solid var(--border)}
.cm-tools input{flex:1;min-width:0;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:6px;font-size:11px;outline:none;font-family:inherit}
.cm-tools input:focus{border-color:var(--accent)}
.cm-tools button{border:1px solid var(--accent);background:rgba(0,217,126,0.12);color:var(--accent);padding:0 8px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.cm-tools button:hover{background:rgba(0,217,126,0.2)}
.cm-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.cm-list::-webkit-scrollbar{width:6px}.cm-list::-webkit-scrollbar-track{background:transparent}.cm-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.cm-foot{padding:6px 10px;border-top:1px solid var(--border);display:flex;gap:4px}
.cm-foot button{flex:1;padding:6px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s}
.cm-foot button:hover{border-color:var(--accent);color:var(--accent)}
.cm-foot button.primary{border-color:var(--accent);color:var(--accent)}
.client-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;cursor:pointer;font-size:11px;border-bottom:1px solid var(--border);transition:background 0.12s;color:var(--text)}
.client-item:hover{background:rgba(0,217,126,0.06)}
.client-item:last-child{border-bottom:none}
.client-item .chevron{color:var(--muted);font-size:13px;opacity:0.5;transition:opacity 0.15s}
.client-item:hover .chevron{opacity:1;color:var(--accent)}
.btn-save{width:100%;background:transparent;border:1px solid var(--accent);color:var(--accent);padding:9px;border-radius:9px;font-family:'Golos Text',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;margin-bottom:4px;transition:all 0.2s}
.btn-save:hover{background:rgba(0,217,126,0.1)}
.btn-save:disabled{opacity:0.4;cursor:not-allowed}
.ctype-wrap{display:flex;gap:0;border:1px solid var(--border);border-radius:7px;overflow:hidden;height:32px}
.ctype-btn{flex:1;padding:0;background:transparent;border:none;border-right:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s}
.ctype-btn:last-child{border-right:none}
.ctype-btn:hover{background:rgba(255,255,255,0.03)}
.ctype-btn.on{background:var(--accent);color:#0c0c0e}
.crm-st{font-size:11px;margin-left:2px;min-height:14px;margin-bottom:8px}
.crm-st.ok{color:var(--accent)}
.crm-st.err{color:#ff8080}
.kp-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px}
.kp-tag{background:var(--surface2);border:2px solid var(--border);color:var(--muted);padding:5px 11px;border-radius:7px;cursor:pointer;font-family:'Golos Text',sans-serif;font-size:12px;font-weight:700;transition:all 0.15s;user-select:none}
.kp-tag:hover{border-color:var(--accent);color:var(--accent)}
.kp-tag.on{background:rgba(0,217,126,0.2);border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.pos-list{display:flex;flex-direction:column;gap:4px;margin-bottom:5px}
.pos-row{display:grid;grid-template-columns:1fr 24px;gap:4px;align-items:center}
.pos-row input{font-size:12px;padding:6px 9px}
.btn-x{width:24px;height:24px;border:1px solid var(--border);background:transparent;color:var(--muted2);border-radius:5px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.18s;flex-shrink:0;padding:0}
.btn-x:hover{border-color:#ff4444;color:#ff4444}
.btn-add{background:transparent;border:1px dashed var(--border);color:var(--muted);width:100%;padding:5px;border-radius:7px;cursor:pointer;font-size:12px;font-family:'Golos Text',sans-serif;transition:all 0.2s;margin-top:2px}
.btn-add:hover{border-color:var(--accent);color:var(--accent)}
.btn-gen{width:100%;background:var(--accent);color:#0c0c0e;border:none;padding:13px;border-radius:9px;font-family:'Golos Text',sans-serif;font-size:15px;font-weight:900;letter-spacing:1px;cursor:pointer;margin-top:12px;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;white-space:nowrap}
.btn-gen:hover{background:#00ffaa;transform:translateY(-1px)}
.btn-gen:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none}
.btn-refresh{width:100%;background:transparent;border:1px solid var(--accent);color:var(--accent);padding:9px;border-radius:9px;font-family:'Golos Text',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;transition:all 0.2s}
.btn-refresh:hover{background:rgba(0,217,126,0.1)}
.btn-refresh:disabled{opacity:0.4;cursor:not-allowed}
.content-wrap{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.content{overflow-y:auto;padding:20px;flex:1}
.depth-bar{display:flex;gap:6px;justify-content:center;padding:8px 0;flex-shrink:0}
.empty-st{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);text-align:center;gap:10px}
.loading{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.doc-wrap{max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
.doc-toolbar{display:flex;gap:8px;flex-wrap:wrap}
.btn-t{border:none;padding:9px 16px;border-radius:9px;cursor:pointer;font-family:'Golos Text',sans-serif;font-size:13px;font-weight:700;transition:all 0.2s}
.btn-copy{background:var(--accent);color:#0c0c0e}
.btn-copy:hover{background:#00ffaa}
.btn-dl{background:var(--accent2);color:#fff}
.btn-dl:hover{opacity:0.88}
.doc-block{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px 36px;font-size:14px;line-height:1.8;color:#e0e0e0}
.doc-block h1{font-size:21px;font-weight:900;margin:0 0 14px;color:#fff;line-height:1.3}
.doc-block h2{font-size:15px;font-weight:700;margin:26px 0 9px;color:var(--accent);padding-top:18px;border-top:1px solid var(--border)}
.doc-block h3{font-size:13px;font-weight:700;margin:14px 0 5px;color:#ddd}
.doc-block p{margin:0 0 9px;color:#bbb;line-height:1.8}
.doc-block ul{margin:5px 0 12px;padding-left:20px}
.doc-block li{margin:4px 0;color:#bbb;line-height:1.7}
.doc-block strong{color:#eee}
.doc-block img{width:100%;border-radius:9px;margin:14px 0 24px;display:block}
.chat-float{position:fixed;bottom:24px;right:28px;width:460px;z-index:500;animation:fadeUp 0.25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.chat-hint{font-size:11px;color:var(--muted);margin-bottom:6px;padding:0 2px}
.chat-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:12px 14px;box-shadow:0 8px 32px rgba(0,0,0,0.5);display:flex;gap:10px;align-items:center}
.chat-inp{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-family:'Golos Text',sans-serif;font-size:13px;outline:none;transition:border-color 0.18s}
.chat-inp:focus{border-color:var(--accent3)}
.chat-inp::placeholder{color:var(--muted)}
.btn-send{background:var(--accent3);color:#fff;border:none;padding:10px 16px;border-radius:10px;cursor:pointer;font-family:'Golos Text',sans-serif;font-size:13px;font-weight:600;white-space:nowrap;transition:opacity 0.2s}
.btn-send:hover{opacity:0.85}
.btn-send:disabled{opacity:0.35;cursor:not-allowed}
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;z-index:300;background:var(--surface2);border:1px solid var(--accent);border-top:none;border-radius:0 0 8px 8px;max-height:170px;overflow-y:auto;display:none}
.ac-list.open{display:block}
.ac-item{padding:7px 11px;font-size:13px;cursor:pointer;color:var(--text);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;transition:background 0.1s}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.sel{background:rgba(0,217,126,0.09)}
.ac-item:hover .ac-t,.ac-item.sel .ac-t{color:var(--accent)}
.ac-t{flex:1}
.ac-del{color:var(--muted2);font-size:15px;line-height:1;padding:1px 3px;border-radius:3px;transition:all 0.15s}
.ac-del:hover{color:#ff4444}
.ac-item mark{background:transparent;color:var(--accent);font-weight:700}
.error-box{background:rgba(255,80,80,0.09);border:1px solid rgba(255,80,80,0.25);color:#ff8080;padding:12px 16px;border-radius:8px;font-size:13px}
.right-tabs{background:var(--surface);border-left:1px solid var(--border);padding:10px 8px;display:flex;flex-direction:column;gap:6px;overflow-y:auto}
.rtab{display:flex;flex-direction:column;align-items:center;gap:5px;padding:14px 6px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;text-align:center;font-family:Golos Text,sans-serif;font-size:10px;font-weight:700;letter-spacing:0.5px;transition:all 0.2s;width:100%;position:relative;overflow:hidden}
.depth-bar{display:flex;gap:6px;justify-content:center;padding:8px 0}
.depth-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;padding:0}
.depth-btn:hover{border-color:var(--accent);color:var(--accent)}
.depth-btn.on{border-color:var(--accent);background:rgba(0,217,126,0.12);color:var(--accent)}
.sec-bar{display:flex;gap:5px;justify-content:center;padding:0 8px 8px;flex-shrink:0}
.sec-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:11px;font-family:'Golos Text',sans-serif;font-weight:600;transition:all 0.2s;letter-spacing:0.3px}
.sec-btn:hover{border-color:var(--accent);color:var(--accent)}
.sec-btn.on{border-color:var(--accent);background:rgba(0,217,126,0.12);color:var(--accent)}
.depth-bar.muted,.sec-bar.muted{opacity:0.45;pointer-events:none;transition:opacity 0.2s}
.analytics-top-row{display:flex;justify-content:center;padding:8px 0 4px;flex-shrink:0;gap:8px}
.btn-projects{border:1px solid var(--border);background:var(--surface2);color:var(--muted);padding:8px 20px;font-size:13px;font-weight:700;font-family:'Golos Text',sans-serif;cursor:pointer;border-radius:10px;transition:all 0.2s}
.btn-projects:hover{border-color:var(--accent);color:var(--accent)}
.btn-projects-return{padding:12px 28px;font-size:15px;background:var(--accent);color:#0c0c0e;border-color:var(--accent)}
.btn-projects-return:hover{background:#00ffaa;border-color:#00ffaa}
.analytics-tumbler{display:flex;justify-content:center;gap:0;padding:10px 0 6px;flex-shrink:0;border-bottom:1px solid var(--border);margin-bottom:4px}
.analytics-tumbler.hide{display:none !important}
.analytics-tumbler button{border:1px solid var(--border);background:var(--surface2);color:var(--muted);padding:8px 18px;font-size:13px;font-weight:700;font-family:'Golos Text',sans-serif;cursor:pointer;transition:all 0.2s}
.analytics-tumbler button:first-child{border-radius:10px 0 0 10px;border-right:none}
.analytics-tumbler button:last-child{border-radius:0 10px 10px 0}
.analytics-tumbler button:not(:first-child){border-left:none}
.analytics-tumbler button.on{border-color:var(--accent);background:rgba(0,217,126,0.15);color:var(--accent)}
.analytics-tumbler button:hover:not(.on){border-color:var(--accent);color:var(--accent)}
.analytics-top-row{display:flex;justify-content:center;padding:8px 0 4px;flex-shrink:0;border-bottom:1px solid var(--border);margin-bottom:4px}
.analytics-top-row:empty{display:none}
.btn-projects{border:1px solid var(--border);background:var(--surface2);color:var(--muted);padding:8px 20px;font-size:13px;font-weight:700;font-family:'Golos Text',sans-serif;cursor:pointer;border-radius:10px;transition:all 0.2s}
.btn-projects:hover{border-color:var(--accent);color:var(--accent)}
.btn-projects-return{padding:12px 28px;font-size:15px;background:var(--accent);color:#0c0c0e;border-color:var(--accent)}
.btn-projects-return:hover{background:#00ffaa;border-color:#00ffaa}
body.projects-mode .analytics-tumbler,body.projects-mode .depth-bar,body.projects-mode .sec-bar{display:none !important}
body.projects-mode .right-tabs{display:none !important}
body.projects-mode .gen-mobile-wrap{display:none !important}
/* ——— Экран Проекты ——— */
.projects-board{display:flex;height:100%;min-height:400px;overflow:hidden;background:var(--bg)}
.projects-left{width:380px;min-width:380px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.projects-table-wrap{flex:1;overflow:auto;min-width:0}
.projects-zone{ padding:10px 12px;border-bottom:1px solid var(--border)}
.projects-zone-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.projects-zone.active .projects-zone-title{color:var(--accent)}
.projects-zone.second .projects-zone-title{color:#ffb347}
.projects-zone.archive .projects-zone-title{color:var(--muted)}
.proj-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:4px;cursor:pointer;border:1px solid transparent;transition:all 0.15s}
.proj-row:hover{background:rgba(255,255,255,0.03)}
.proj-row.expanded{background:rgba(0,217,126,0.06)}
.proj-expand{width:20px;flex-shrink:0;color:var(--muted);font-size:12px;cursor:pointer}
.proj-title{flex:1;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-status{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap}
.proj-status.work{background:rgba(0,217,126,0.2);color:var(--accent)}
.proj-status.wait{background:rgba(255,200,0,0.2);color:#ffc800}
.proj-status.done{background:rgba(0,217,126,0.3);color:var(--accent)}
.proj-status.off{background:rgba(255,80,80,0.15);color:#ff8080}
.proj-path{display:flex;gap:2px;margin-top:4px;flex-wrap:wrap}
.proj-path span{width:18px;height:18px;border-radius:4px;border:1px solid var(--border);font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.proj-path span.on{border-color:var(--accent);color:var(--accent);background:rgba(0,217,126,0.1)}
.proj-child{padding-left:28px;font-size:12px;color:var(--muted)}

function getTodayISO() {
  var d = new Date();
  d.setHours(0,0,0,0);

}

function stopProjectsSheetPullTimer() {

function runProjectsSheetPull(forceMerge) {
  if (document.hidden) return;
  if (!_driveToken) return;
  if (_projectsSheetPullBusy) return;
  _projectsSheetPullBusy = true;
  hydrateProjectsFromActiveSheet(!!forceMerge).then(function(changed){
    if (!projectsMode) return;
    if (changed) rerenderProjectsPreserveScroll();
  }).catch(function(){}).finally(function(){
    _projectsSheetPullBusy = false;
  });
}

function startProjectsSheetPullTimer() {

function loadProjectsData() {
  try {
    var s = localStorage.getItem(PROJECTS_DATA_KEY);
    var data = s ? JSON.parse(s) : null;
    if (!data || !data.projects || data.projects.length < 10) {
      return getDefaultProjectsData();
    }
    // Migration: once switch default path buttons to OFF for existing local data.
    if (!localStorage.getItem('avitolog_projects_path_defaults_off_v1')) {
      data.projects.forEach(function(p) {
        p.clientPath = {autoload:false,analytics:false,texts:false,packaging:false,portfolio:false};
      });
      localStorage.setItem('avitolog_projects_path_defaults_off_v1', '1');
      saveProjectsData(data);
    } else {
      data.projects.forEach(function(p) {
        if (!p.clientPath || typeof p.clientPath !== 'object') {
          p.clientPath = {autoload:false,analytics:false,texts:false,packaging:false,portfolio:false};
        }
      });
    }
    return data;
  } catch(e) { return getDefaultProjectsData(); }
}
function saveProjectsData(data) {
  try { localStorage.setItem(PROJECTS_DATA_KEY, JSON.stringify(data)); } catch(e) {}
}
async function hydrateProjectsFromActiveSheet(forceMerge) {
  if (!_driveToken) return false;
  if (typeof forceMerge === 'undefined') forceMerge = false;
  try {
    var localRaw = localStorage.getItem(PROJECTS_DATA_KEY);
    if (!forceMerge && localRaw) {
      var localData = JSON.parse(localRaw);
      if (localData && localData.projects && localData.projects.length >= 10) return false;
    }
  } catch(e) {}
  try {
    var range = PROJECTS_ACTIVE_SHEET_NAME + '!A2:M';
    var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEETS_ID + '/values/' + encodeURIComponent(range);
    var resp = await fetch(url, { headers: {'Authorization': 'Bearer ' + _driveToken} });
    if (!resp.ok) return false;
    var json = await resp.json();
    var rows = json.values || [];
    if (!rows.length) return false;
    var latestById = {};
    rows.forEach(function(r) {
      var pid = String(r[1] || '').trim();
      if (!pid) return;
      var ts = r[0] || '';
      if (!latestById[pid] || String(latestById[pid][0] || '') <= String(ts)) latestById[pid] = r;
    });
    var data = loadProjectsData();
    if (!data || !data.projects || !data.projects.length) data = getDefaultProjectsData();
    var changed = false;
    data.projects.forEach(function(p) {
      var r = latestById[p.id];
      if (!r) return;
      var title = r[2] || p.title;
      var status = r[3] || p.status;
      var folderLink = r[7] || p.folderLink || '';
      var folderId = r[8] || p.folderId || '';
      var clientType = r[9] || p.clientType;
      var optionalField = r[10] || p.optionalField || '';
      var pathText = r[4] || '';
      var nextPath = {
        autoload: pathText.indexOf('Автозагрузка') >= 0,
        analytics: pathText.indexOf('Аналитика') >= 0,
        texts: pathText.indexOf('Тексты') >= 0,
        packaging: pathText.indexOf('Упаковка') >= 0,
        portfolio: pathText.indexOf('Портфолио') >= 0
      };
      var start = r[5] || '';
      var end = r[6] || '';
      if (p.title !== title) { p.title = title; changed = true; }
      if (p.status !== status) { p.status = status; changed = true; }
      if ((p.folderLink || '') !== folderLink) { p.folderLink = folderLink; changed = true; }
      if ((p.folderId || '') !== folderId) { p.folderId = folderId; changed = true; }
      if (p.crmData && typeof p.crmData === 'object') {
        if ((p.crmData.folderLink || '') !== (p.folderLink || '')) {
          p.crmData.folderLink = p.folderLink || '';
          changed = true;
        }
        if ((p.crmData.folderId || '') !== (p.folderId || '')) {
          p.crmData.folderId = p.folderId || '';
          changed = true;
        }
      }
      if ((p.clientType || '') !== clientType) { p.clientType = clientType; changed = true; }
      if ((p.optionalField || '') !== optionalField) { p.optionalField = optionalField; changed = true; }
      var prevPath = p.clientPath || {};
      if (!!prevPath.autoload !== !!nextPath.autoload || !!prevPath.analytics !== !!nextPath.analytics || !!prevPath.texts !== !!nextPath.texts || !!prevPath.packaging !== !!nextPath.packaging || !!prevPath.portfolio !== !!nextPath.portfolio) {
        p.clientPath = nextPath;
        changed = true;
      }
      if (start && end) {
        var prevRange = (p.events || []).find(function(e){ return e.type === 'active_range'; });
        if (!prevRange || prevRange.startDate !== start || prevRange.endDate !== end) {
          p.events = (p.events || []).filter(function(e){ return e.type !== 'active_range'; });
          p.events.push({type:'active_range', startDate:start, endDate:end});
          changed = true;
        }
      }
    });
    if (changed) saveProjectsData(data);
    return changed;
  } catch(e) {
    console.warn('hydrateProjectsFromActiveSheet failed:', e);
    return false;
  }
}

function getProjectPathSummary(p) {
  if (!p || !p.clientPath) return '';
  var labels = [];
  if (p.clientPath.autoload) labels.push('Автозагрузка');
  if (p.clientPath.analytics) labels.push('Аналитика');
  if (p.clientPath.texts) labels.push('Тексты');
  if (p.clientPath.packaging) labels.push('Упаковка');
  if (p.clientPath.portfolio) labels.push('Портфолио');
  return labels.join(', ');
}
function getProjectAutoloadRange(p) {
  var ranges = (p && p.events ? p.events : []).filter(function(e) { return e && e.type === 'active_range'; });
  if (!ranges.length) return {start:'', end:''};
  ranges.sort(function(a,b){ return String(a.startDate||'').localeCompare(String(b.startDate||'')); });
  return {start: ranges[0].startDate || '', end: ranges[ranges.length - 1].endDate || ''};
}
function escAttr(v) {
  return String(v == null ? '' : v).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function normalizeProjectClientType(t) {
  var v = String(t || '').trim().toLowerCase();
  if (!v) return 'new';
  if (v === 'old' || v === '💎' || v.indexOf('diamond') >= 0 || v.indexOf('стар') >= 0) return 'old';
  if (v === 'returning' || v === '2' || v === '2️⃣' || v.indexOf('return') >= 0 || v.indexOf('repeat') >= 0) return 'returning';
  if (v === 'new' || v.indexOf('нов') >= 0) return 'new';
  return 'new';
}

function getProjectsStickyWidthPx(projects) {
  var longest = 'Проект';
  (projects || []).forEach(function(p) {

async function ensureActiveProjectsSheet() {
  var readUrl = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEETS_ID + '/values/' + encodeURIComponent(PROJECTS_ACTIVE_SHEET_NAME + '!A1:A1');
  var readResp = await fetch(readUrl, { headers: {'Authorization': 'Bearer ' + _driveToken} });
  if (readResp.ok) return;
  var createUrl = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEETS_ID + ':batchUpdate';
  await fetch(createUrl, {
    method: 'POST',
    headers: {'Authorization': 'Bearer ' + _driveToken, 'Content-Type': 'application/json'},
    body: JSON.stringify({requests:[{addSheet:{properties:{title:PROJECTS_ACTIVE_SHEET_NAME}}}]})
  }).catch(function(){});
}
function buildActiveProjectRow(p, reason) {
  var rng = getProjectAutoloadRange(p);
  return [
    new Date().toISOString(),
    p.id || '',
    p.title || '',
    p.status || '',
    getProjectPathSummary(p),
    rng.start || '',
    rng.end || '',
    p.folderLink || '',
    p.folderId || '',
    p.clientType || '',
    p.optionalField || '',
    reason || '',
    _driveUserEmail || ''
  ];
}
async function syncActiveProjectsSheetExact(reason) {
  if (!_driveToken) return;
  await ensureActiveProjectsSheet();
  var data = loadProjectsData();
  var active = (data.projects || [])
    .filter(function(p){ return (p.zone || 'active') === 'active'; })
    .sort(function(a,b){ return (a.sortOrder||0) - (b.sortOrder||0); });
  var rows = active.map(function(p){ return buildActiveProjectRow(p, reason || 'sync'); });
  var clearUrl = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEETS_ID + '/values/' + encodeURIComponent(PROJECTS_ACTIVE_SHEET_NAME + '!A2:M') + ':clear';
  await fetch(clearUrl, {
    method: 'POST',
    headers: {'Authorization': 'Bearer ' + _driveToken, 'Content-Type': 'application/json'},
    body: '{}'
  });
  if (!rows.length) return;
  var setUrl = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEETS_ID + '/values/' + encodeURIComponent(PROJECTS_ACTIVE_SHEET_NAME + '!A2:M' + (rows.length + 1)) + '?valueInputOption=USER_ENTERED';
  var resp = await fetch(setUrl, {
    method: 'PUT',
    headers: {'Authorization': 'Bearer ' + _driveToken, 'Content-Type': 'application/json'},
    body: JSON.stringify({values: rows})
  });
  if (!resp.ok) {
    var err = await resp.json().catch(function() { return {}; });
    throw new Error('Активные: ' + (err.error && err.error.message ? err.error.message : resp.status + ' ' + resp.statusText));
  }
}
function syncProjectToActiveSheet(projectId, reason) {

}

function findClientForProject(project) {
  var clients = getCrmClients();
  if (!project || !clients.length) return null;
  if (project.crmClientId) {
    var byId = clients.find(function(c){ return c.client_id === project.crmClientId; });
    if (byId) return byId;
  }
  if (project.folderId) {
    var byFolder = clients.find(function(c){ return String(c.folderId || '') === String(project.folderId || ''); });
    if (byFolder) return byFolder;
  }
  var t = (project.title || '').toLowerCase().trim();
  if (!t) return null;
  return clients.find(function(c) {
    var cc = (c.company || '').toLowerCase();
    var cn = (c.contact_name || '').toLowerCase();
    return t.indexOf(cc) >= 0 || cc.indexOf(t) >= 0 || t.indexOf(cn) >= 0 || cn.indexOf(t) >= 0;
  }) || null;
}
function hasProjectCrmData(project) {
  if (!project || !project.crmData) return false;
  var d = project.crmData;
  return !!(d.company || d.contact_name || d.phone || d.telegram || d.avito_account || d.category || d.city || d.notes || d.kp_count || d.client_type);
}
function getProjectPreferredFolder(project) {
  var p = project || {};
  var d = p.crmData || {};

function normalizeIsoDateInput(v) {
  var s = String(v || '').trim();
  if (!s) return '';
  var m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!m) {
    m = s.match(/^(\d{2})[.\-/](\d{2})[.\-/](\d{4})$/);
    if (m) s = m[3] + '-' + m[2] + '-' + m[1];
  }
  if (!/^\d{4}-\d{2}-\d{2}$/.test(s)) return '';
  var parts = s.split('-');
  var y = parseInt(parts[0], 10);
  var mo = parseInt(parts[1], 10);
  var d = parseInt(parts[2], 10);
  if (!isFinite(y) || !isFinite(mo) || !isFinite(d)) return '';
  var dt = new Date(y, mo - 1, d);
  if (isNaN(dt.getTime())) return '';
  if (dt.getFullYear() !== y || (dt.getMonth() + 1) !== mo || dt.getDate() !== d) return '';
  return s;
}

function reorderProjectsWithinZone(sourceId, targetId, placeAfter) {
  var data = loadProjectsData();
  var src = data.projects.find(function(p){ return p.id === sourceId; });
  var tgt = data.projects.find(function(p){ return p.id === targetId; });
  if (!src || !tgt) return false;
  if ((src.zone || 'active') !== (tgt.zone || 'active')) return false;
  var zone = src.zone || 'active';
  var zoneList = data.projects
    .filter(function(p){ return (p.zone || 'active') === zone; })
    .sort(function(a,b){ return (a.sortOrder||0) - (b.sortOrder||0); });
  var ids = zoneList.map(function(p){ return p.id; });
  var fromIdx = ids.indexOf(sourceId);
  var targetIdx = ids.indexOf(targetId);
  if (fromIdx < 0 || targetIdx < 0) return false;
  var moving = ids.splice(fromIdx, 1)[0];
  var insertIdx = ids.indexOf(targetId) + (placeAfter ? 1 : 0);
  ids.splice(insertIdx, 0, moving);
  ids.forEach(function(id, idx) {
    var p = data.projects.find(function(x){ return x.id === id; });
    if (p) p.sortOrder = idx;
  });
  saveProjectsData(data);
  rerenderProjectsPreserveScroll();
  syncProjectToActiveSheet(sourceId, 'row_reorder');
  return true;
}

function editProjectCell(el) {
  var cell = el.closest('.proj-cell-editable');
  if (!cell || cell.classList.contains('editing')) return;
  cell.classList.add('editing');
  var inp = cell.querySelector('input');
  inp.removeAttribute('readonly');
  inp.style.pointerEvents = '';
  inp.focus();
  inp.select();
  function done() {
    cell.classList.remove('editing');
    inp.setAttribute('readonly','');
    inp.style.pointerEvents = 'none';
    var id = cell.getAttribute('data-id');
    var data = loadProjectsData();
    var p = data.projects.find(function(x){ return x.id===id; });
    if (p) {
      p.title = inp.value.trim() || p.title;
      saveProjectsData(data);
      syncProjectToActiveSheet(id, 'title_edit');
    }
  }
  inp.onblur = done;
  inp.onkeydown = function(e) { if (e.key==='Enter') { e.preventDefault(); inp.blur(); } };
}

    s.textContent = em;

function handleProjectChildLineKey(e, projectId, idx) {
  if (e.key === 'Enter') {
    e.preventDefault();
    addProjectChildLine(projectId, idx);
  }
}
function updateProjectChildLine(projectId, idx, value) {
  var data = loadProjectsData();
  var p = data.projects.find(function(x){ return x.id===projectId; });
  if (!p) return;
  var lines = getProjectChildLines(p);
  lines[idx] = value;
  p.childLines = lines;
  saveProjectsData(data);
}
function addProjectChildLine(projectId, idx) {
  var data = loadProjectsData();
  var p = data.projects.find(function(x){ return x.id===projectId; });
  if (!p) return;
  var lines = getProjectChildLines(p);
  var insertAt = Math.max(0, Math.min(lines.length, idx + 1));
  lines.splice(insertAt, 0, '');
  p.childLines = lines;
  _expandedProjectIds[projectId] = true;
  _projectChildFocusKey = projectId + ':' + insertAt;
  saveProjectsData(data);
  rerenderProjectsPreserveScroll();
  syncProjectToActiveSheet(projectId, 'child_line_add');
}
function removeProjectChildLine(projectId, idx) {
  var data = loadProjectsData();
  var p = data.projects.find(function(x){ return x.id===projectId; });
  if (!p) return;
  var lines = getProjectChildLines(p);
  if (lines.length <= 1) {
    lines[0] = '';
  } else {
    lines.splice(idx, 1);
  }
  p.childLines = lines;
  _expandedProjectIds[projectId] = true;
  _projectChildFocusKey = projectId + ':' + Math.max(0, idx - 1);
  saveProjectsData(data);
  rerenderProjectsPreserveScroll();
  syncProjectToActiveSheet(projectId, 'child_line_remove');
}
function toggleProjectPath(projectId, key) {
  var data = loadProjectsData();
  var p = data.projects.find(function(x){ return x.id===projectId; });
  if (!p) return;
  if (!p.clientPath || typeof p.clientPath !== 'object') {
    p.clientPath = {autoload:false,analytics:false,texts:false,packaging:false,portfolio:false};
  }
  p.clientPath[key] = !p.clientPath[key];
  saveProjectsData(data);
  rerenderProjectsPreserveScroll();
  syncProjectToActiveSheet(projectId, 'path_toggle_' + key);

function cycleProjectClientType(projectId) {

  rerenderProjectsPreserveScroll();
  syncProjectToActiveSheet(projectId, 'client_type_cycle');

function switchTab(tab) {
  currentTab = tab;
  ['analysis','presale','avito1'].forEach(function(t) {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  // Depth bar: 3 кнопки для аналитики, 2 для остальных
  var bar = document.getElementById('depthBar');
  bar.style.display = 'flex';
  var btns = bar.querySelectorAll('.depth-btn');
  btns[2].style.display = tab === 'analysis' ? '' : 'none'; // 🔨 только для аналитики
  // Section bar только для аналитики
  document.getElementById('secBar').style.display = tab === 'analysis' ? 'flex' : 'none';
  var tumbler = document.getElementById('analyticsTumbler');
  if (tumbler) tumbler.classList.toggle('hide', tab !== 'analysis');
  var depthBar = document.getElementById('depthBar');
  var secBar = document.getElementById('secBar');
  if (tab === 'analysis') {
    if (!analyticsMode) {
      depthBar.classList.add('muted');
      secBar.classList.add('muted');
    } else {
      depthBar.classList.remove('muted');
      secBar.classList.remove('muted');
    }
  }
  // Сброс на mid если max был выбран для не-аналитики
  if (tab !== 'analysis' && currentDepth === 'max') { setDepth('mid'); }
  if (!docReady) {
    var ico = tab==='analysis' ? '📊' : tab==='presale' ? '⏰' : '🏆';
    document.getElementById('mainContent').innerHTML =
      '<div class="empty-st"><div style="font-size:38px;opacity:.2">' +
      ico +
      '</div><p style="font-size:14px">Заполни данные и нажми Сгенерировать</p></div>';
  }
}

function generate() {
  acSaveAll();

  btns.forEach(function(b) {
    b.disabled = true;
    b.innerHTML = '<span>⚡</span><span>Генерирую...</span>';
  });
  pgStart();
  setContent('<div class="loading"><div class="spinner"></div><p>AI анализирует нишу...</p></div>');
  hideChat();

  currentData = {
    company:   v('company'),
    name:      v('contact_name'),
    tg:        v('tg'),
    phone:     v('phone'),
    category:  v('category'),
    city:      v('city'),
    notes:     v('notes'),
    avito_account: v('avito_account'),
    client_type: v('client_type'),
    kp:        v('kp_count'),
    positions: getPos()
  };

  var prompt = currentTab === 'analysis' ? buildAnalysisPrompt() :
               currentTab === 'presale' ? buildPresalePrompt() :
               buildAvito1Prompt();

  var maxTok = currentTab === 'analysis' 
    ? (currentDepth === 'light' ? 4000 : currentDepth === 'max' ? 8000 : 6000) 
    : (currentDepth === 'light' ? 3000 : 4500);
  callAPI(prompt, maxTok).then(function(raw) {
    var cleaned = raw.replace(/```json|```/g, '').trim();
    var json = JSON.parse(fixJSON(cleaned));
    saveNorm(json.normalized);
    renderDoc(json.html);
    if (document.getElementById('crmToggle').checked) {
      if (_driveToken) {
        setTimeout(function() { triggerCRM(json.html); }, 500);
      } else {
        var st = document.getElementById('crmSt');
        st.className = 'crm-st err';
        st.textContent = '✗ Нажмите 🔑 Drive для авторизации';
      }
    }
  }).catch(function(e) {
    setContent('<div class="error-box">Ошибка: ' + e.message + '</div>');
  }).finally(function() {
    document.querySelectorAll('.btn-gen, .btn-gen-mobile').forEach(function(b) {
      b.disabled = false;
      b.innerHTML = '<span>⚡</span><span>СГЕНЕРИРОВАТЬ</span>';
    });
    pgStop();
  });
}

function withImg(html) {
  if (!html || typeof html !== 'string') return html;
  var thumb = getAnalyticsHeaderImgThumb();
  var img = '<div class="doc-header-img" style="text-align:center;margin:0 0 20px"><img src="' + thumb + '" alt="" style="max-width:100%;width:600px;height:auto;border-radius:9px;display:block;margin:0 auto"></div>';
  var h1End = html.indexOf('</h1>');
  if (h1End === -1) h1End = html.indexOf('</H1>');
  if (h1End >= 0) {
    return html.slice(0, h1End + 5) + img + html.slice(h1End + 5);
  }
  var centerIdx = html.indexOf('text-align:center');
  var divEnd = -1;
  if (centerIdx >= 0 && centerIdx < 800) {
    divEnd = html.indexOf('</div>', centerIdx);
  }
  if (divEnd === -1) divEnd = html.indexOf('</div>');
  if (divEnd >= 0 && divEnd < 2000) {
    return html.slice(0, divEnd + 6) + img + html.slice(divEnd + 6);
  }
  return img + html;
}

  if (divEnd >= 0 && divEnd < 2000) {

function sendChat() {
  var inp = document.getElementById('chatInp');
  var btn = document.getElementById('btnSend');
  var comment = inp.value.trim();
  if (!comment || !currentHtml) return;
  inp.disabled = true;

  btn.textContent = '...';

  var prompt = 'HTML документа:\n' + currentHtml + '\n\nПравка: "' + comment + '"\n\nВерни JSON: {"html":"..."}';
  callAPI(prompt, 2000).then(function(raw) {
    var json = JSON.parse(fixJSON(raw.replace(/```json|```/g,'').trim()));
    if (json.html) { 
      currentHtml = json.html; 
      renderDoc(json.html);
      // Показываем кнопку обновления если есть Doc в Drive
      if (lastDocId && _driveToken) {
        document.getElementById('refreshBtn').style.display = 'block';
      }
    }
  }).catch(function(e) {
    alert('Ошибка: ' + e.message);
  }).finally(function() {
    inp.value = '';
    inp.disabled = false;
    btn.disabled = false;
    btn.textContent = 'Применить';
  });
}

// ── COPY ──
function copyDoc() {
  var btn = document.querySelector('.btn-copy');
  var tmp = document.createElement('div');
  tmp.contentEditable = 'true';
  tmp.style.cssText = 'position:fixed;left:-9999px;top:0;width:700px;background:#fff;color:#000;font-family:Arial,sans-serif;font-size:11pt';
  tmp.innerHTML = withImg(currentHtml);
  document.body.appendChild(tmp);
  tmp.focus();
  var r = document.createRange();
  r.selectNodeContents(tmp);
  var s = window.getSelection();
  s.removeAllRanges();
  s.addRange(r);
  var ok = document.execCommand('copy');
  s.removeAllRanges();
  document.body.removeChild(tmp);
  if (ok && btn) {

function getStoredDriveAuth() {

}
function clearStoredDriveAuth() {
  try { localStorage.removeItem(DRIVE_AUTH_KEY); } catch(e) {}
}
function restoreDriveTokenFromStorage() {
  var s = getStoredDriveAuth();
  if (!s || !s.token) return false;
  if (s.exp && Date.now() >= Number(s.exp)) {
    clearStoredDriveAuth();
    return false;
  }
  _driveToken = s.token;
  return true;
}
function persistDriveToken(token, expiresInSec) {
  if (!token) return;
  var exp = Date.now() + (Math.max(60, Number(expiresInSec) || 3600) - 60) * 1000;
  try { localStorage.setItem(DRIVE_AUTH_KEY, JSON.stringify({token: token, exp: exp})); } catch(e) {}
}

function applyOAuthHash(hash) {
  if (!hash || hash.indexOf('access_token=') < 0) return false;
  var m = hash.match(/access_token=([^&]+)/);
  if (!m) return false;
  _driveToken = m[1];
  var ex = hash.match(/expires_in=([^&]+)/);
  persistDriveToken(_driveToken, ex ? parseInt(ex[1], 10) : 3600);
  return true;
}
function buildAuthUrl() {
  return 'https://accounts.google.com/o/oauth2/v2/auth'
    + '?client_id=' + encodeURIComponent(OAUTH_CLIENT_ID)
    + '&redirect_uri=' + encodeURIComponent(OAUTH_REDIRECT_URI)
    + '&response_type=token'
    + '&scope=' + encodeURIComponent(OAUTH_SCOPE)
    + '&include_granted_scopes=true';
}

function startAuth() {
  if (!_driveToken) restoreDriveTokenFromStorage();
  if (_driveToken) { setDriveConnectedUiState(); return; }
  var authUrl = buildAuthUrl();
  var canUsePopup = false;
  try {
    canUsePopup = (new URL(OAUTH_REDIRECT_URI)).origin === window.location.origin;
  } catch(e) {}
  if (!canUsePopup) {
    window.location.href = authUrl;
    return;
  }
  var w = 540, h = 700;
  var left = Math.max(0, Math.round((window.screen.width - w) / 2));
  var top = Math.max(0, Math.round((window.screen.height - h) / 2));
  var pop = window.open(authUrl, 'driveAuth', 'popup=yes,width=' + w + ',height=' + h + ',left=' + left + ',top=' + top);
  if (!pop) {
    window.location.href = authUrl;
    return;
  }
  var started = Date.now();
  var timer = setInterval(function() {
    if (!pop || pop.closed) { clearInterval(timer); return; }
    try {
      var href = pop.location && pop.location.href ? pop.location.href : '';
      if (href && href.indexOf(OAUTH_REDIRECT_URI) === 0) {
        if (applyOAuthHash(pop.location.hash || '')) {
          clearInterval(timer);
          try { pop.close(); } catch(e) {}
          setDriveConnectedUiState();
          return;
        }
      }
    } catch(e) {}
    if (Date.now() - started > 45000) {
      clearInterval(timer);
      try { pop.close(); } catch(e) {}
      window.location.href = authUrl;
    }
  }, 220);
}

async function driveCreateClientFolder(name, parentId) {
  // Создаём папку клиента внутри уже существующей папки категории
  var token = await getDriveToken();
  // Проверяем нет ли уже такой папки
  var q = "name='" + name.replace(/'/g,"\'") + "' and '" + parentId + "' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false";
  var sr = await fetch('https://www.googleapis.com/drive/v3/files?q=' + encodeURIComponent(q) + '&fields=files(id)', {
    headers: {'Authorization': 'Bearer ' + token}
  });
  var sd = await sr.json();
  if (sd.files && sd.files.length > 0) return sd.files[0].id;
  // Создаём новую папку клиента
  var cr = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: {'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json'},
    body: JSON.stringify({name: name, mimeType: 'application/vnd.google-apps.folder', parents: [parentId]})
  });
  var cd = await cr.json();
  if (!cd.id) throw new Error('Не удалось создать папку клиента: ' + JSON.stringify(cd));
  return cd.id;
}

async function driveCreateGoogleDoc(name, htmlContent, parentId) {
  var token = await getDriveToken();
  var enc = new TextEncoder();
  var boundary = 'avitolog_' + Date.now();
  var nl = '\r\n';
  var meta = JSON.stringify({
    name: name,
    mimeType: 'application/vnd.google-apps.document',
    parents: [parentId]
  });
  // Строим multipart тело
  var part1 = '--' + boundary + nl +
    'Content-Type: application/json; charset=UTF-8' + nl + nl +
    meta + nl;
  var part2 = '--' + boundary + nl +
    'Content-Type: text/html; charset=UTF-8' + nl + nl;
  var part3 = nl + '--' + boundary + '--';
  var b1 = enc.encode(part1);
  var b2 = enc.encode(part2);
  var b3 = enc.encode(htmlContent);
  var b4 = enc.encode(part3);
  var total = new Uint8Array(b1.length + b2.length + b3.length + b4.length);
  total.set(b1, 0);
  total.set(b2, b1.length);
  total.set(b3, b1.length + b2.length);
  total.set(b4, b1.length + b2.length + b3.length);
  var resp = await fetch(
    'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink',
    {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'multipart/related; boundary=' + boundary
      },
      body: total
    }
  );
  var result = await resp.json();
  console.log('Drive API response:', resp.status, result);
  if (!result.id) throw new Error('Google Doc не создан: ' + JSON.stringify(result));
  return result;
}

async function driveUploadBlob(name, blob, mimeType, parentId) {
  var token = await getDriveToken();
  var boundary = 'avitolog_' + Date.now();
  var nl = '\r\n';
  var meta = JSON.stringify({name: name, parents: [parentId]});
  var enc = new TextEncoder();
  var pre = '--' + boundary + nl + 'Content-Type: application/json; charset=UTF-8' + nl + nl + meta + nl +
    '--' + boundary + nl + 'Content-Type: ' + mimeType + nl + nl;
  var post = nl + '--' + boundary + '--';
  var preB = enc.encode(pre);
  var postB = enc.encode(post);
  var blobArr = await blob.arrayBuffer();
  var blobB = new Uint8Array(blobArr);
  var body = new Uint8Array(preB.length + blobB.length + postB.length);
  body.set(preB, 0); body.set(blobB, preB.length); body.set(postB, preB.length + blobB.length);
  var resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
    method: 'POST',
    headers: {'Authorization': 'Bearer ' + token, 'Content-Type': 'multipart/related; boundary=' + boundary},
    body: body
  });
  var result = await resp.json();
  if (!result.id) throw new Error('PDF не загружен: ' + JSON.stringify(result));
  return result;
}

// ── FIX JSON ──
function fixJSON(s) {
  try { JSON.parse(s); return s; } catch(e) {}
  var lc = s.lastIndexOf(','), lb = s.lastIndexOf('}'), la = s.lastIndexOf(']');
  if (lc > Math.max(lb,la)) s = s.substring(0,lc);
  var op = 0, ar = 0;
  for (var ci = 0; ci < s.length; ci++) {
    var c = s[ci];
    if (c==='{') op++; else if (c==='}') op--;
    if (c==='[') ar++; else if (c===']') ar--;
  }
  var quotes = (s.match(/"/g)||[]).length;
  if (quotes % 2 !== 0) s += '"';
  while (ar-- > 0) s += ']';
  while (op-- > 0) s += '}';
  return s;
}

var ACF = ['category','city','notes'];
var ACP = 'avitolog_ac_';

function acLoad(f) {
  try { return JSON.parse(localStorage.getItem(ACP+f) || '[]'); } catch(e) { return []; }
}

function acSim(a, b) {
  var x = a.toLowerCase().trim(), y = b.toLowerCase().trim();
  if (x===y) return true;
  if (x.indexOf(y)>=0 || y.indexOf(x)>=0) return true;
  if (Math.abs(x.length-y.length) > 3) return false;
  var d = 0;
  var lo = x.length>y.length ? x : y;
  var sh = x.length>y.length ? y : x;
  for (var i=0; i<sh.length; i++) {
    if (lo[i] !== sh[i]) d++;
    if (d > 2) return false;
  }
  return d + (lo.length - sh.length) <= 2;
}

function acSave(f, v) {
  if (!v || v.trim().length < 2) return;
  var val = v.trim();
  var l = acLoad(f).filter(function(x) { return !acSim(x,val); });
  l.push(val);
  l.sort(function(a,b) { return a.localeCompare(b,'ru'); });
  localStorage.setItem(ACP+f, JSON.stringify(l.slice(-50)));
}

function acSaveAll() {
  ACF.forEach(function(f) {
    var e = document.getElementById(f);
    if (e && e.value.trim()) acSave(f, e.value.trim());
  });
  document.querySelectorAll('.pname').forEach(function(e) {
    if (e.value.trim()) acSave('positions', e.value.trim());
  });
}

function acFlt(f, q) {
  var l = acLoad(f);
  if (!q) return l;
  var lq = q.toLowerCase();
  return l.filter(function(v) { return v.toLowerCase().indexOf(lq) >= 0; });
}

function acHL(t, q) {
  if (!q) return t;
  var i = t.toLowerCase().indexOf(q.toLowerCase());
  if (i < 0) return t;
  return t.slice(0,i) + '<mark>' + t.slice(i,i+q.length) + '</mark>' + t.slice(i+q.length);
}

function setupAC(el, fn) {
  var w = document.createElement('div');
  w.className = 'ac-wrap';
  el.parentNode.insertBefore(w, el);
  w.appendChild(el);
  var lst = document.createElement('div');
  lst.className = 'ac-list';
  w.appendChild(lst);
  var si = -1;

  function show(q) {
    var items = acFlt(fn, q);
    if (!items.length) { lst.classList.remove('open'); return; }
    lst.innerHTML = items.map(function(v, i) {
      var safe = v.replace(/"/g, '&quot;');
      return '<div class="ac-item" data-val="' + safe + '" data-idx="' + i + '">' +
        '<span class="ac-t">' + acHL(v, q) + '</span>' +
        '<span class="ac-del" data-val="' + safe + '">x</span></div>';
    }).join('');
    lst.classList.add('open');
    si = -1;
    lst.querySelectorAll('.ac-item').forEach(function(item) {
      item.querySelector('.ac-del').addEventListener('mousedown', function(e) {
        e.preventDefault(); e.stopPropagation();
        var val = e.target.getAttribute('data-val');
        var saved = acLoad(fn).filter(function(v) { return v !== val; });
        localStorage.setItem(ACP+fn, JSON.stringify(saved));
        show(el.value);
      });
      item.querySelector('.ac-t').addEventListener('mousedown', function(e) {
        e.preventDefault();
        el.value = item.getAttribute('data-val');
        lst.classList.remove('open');
      });
    });
  }

  el.addEventListener('input', function() { show(el.value); });
  el.addEventListener('focus', function() { show(el.value); });
  el.addEventListener('keydown', function(e) {
    var its = lst.querySelectorAll('.ac-item');
    if (!lst.classList.contains('open') || !its.length) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault(); si = Math.min(si+1, its.length-1);
      its.forEach(function(t,i) { t.classList.toggle('sel', i===si); });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault(); si = Math.max(si-1, 0);
      its.forEach(function(t,i) { t.classList.toggle('sel', i===si); });
    } else if (e.key === 'Enter' && si >= 0) {
      e.preventDefault(); el.value = its[si].getAttribute('data-val'); lst.classList.remove('open');
    } else if (e.key === 'Escape') {
      lst.classList.remove('open');
    }
  });
  document.addEventListener('click', function(e) {
    if (!w.contains(e.target)) lst.classList.remove('open');
  });
}

function initAC() {
  ACF.forEach(function(f) {
    var e = document.getElementById(f);
    if (e) setupAC(e, f);
  });
  var fp = document.querySelector('.pname');
  if (fp) setupAC(fp, 'positions');
}

    var clientName = [d.company, d.contact_name].filter(Boolean).join(' - ') || 'Клиент';
    var folderName = clientName + ' (' + d.createdAt + ')';
    var cat = detectCRMCategory(d.category);
    
    // Если активный клиент — используем его папку
    var ac = _activeClient || getActiveClient();
    var folderId;
    if (ac && ac.folderId) {
      folderId = ac.folderId;
    } else {
      folderId = await driveCreateClientFolder(folderName, cat.id);
    }
    var folderLink = 'https://drive.google.com/drive/folders/' + folderId;
    
    // contacts.txt
    var lines = ['=== ' + clientName + ' ==='];
    if (d.company) lines.push('Компания: ' + d.company);
    if (d.contact_name) lines.push('Имя: ' + d.contact_name);
    if (d.phone) lines.push('Телефон: ' + d.phone);
    if (d.telegram) lines.push('Телеграм: ' + d.telegram);
    if (d.avito_account) lines.push('Avito: ' + d.avito_account);
    if (d.client_type) lines.push('Тип: ' + d.client_type);
    if (d.category) lines.push('Ниша: ' + d.category);
    if (d.city) lines.push('Гео: ' + d.city);
    if (d.notes) lines.push('УТП/инфо: ' + d.notes);
    if (d.kp_count) lines.push('КП: ' + d.kp_count);
    lines.push('Дата: ' + d.createdAt);
    await driveUploadText('contacts.txt', lines.join('\n'), 'text/plain', folderId);
    
    // Сохраняем в localStorage
    d.folderId = folderId;
    d.folderLink = folderLink;
    d.folder_name = folderName;
    var selectedProject = getSelectedProject();
    d.client_id = (selectedProject && selectedProject.crmClientId) || d.client_id || '';
    if (!d.client_id) {
      var active = _activeClient || getActiveClient();
      if (active && active.client_id) d.client_id = active.client_id;
    }
    var clients = getCrmClients();
    var existing = findClientIndexByData(clients, d);
    if (!d.client_id && existing >= 0 && clients[existing].client_id) d.client_id = clients[existing].client_id;
    if (!d.client_id) d.client_id = generateClientId();
    if (existing >= 0) {
      if (clients[existing].client_id) d.client_id = clients[existing].client_id;
      clients[existing] = d;
    } else {
      clients.unshift(d);
    }
    saveCrmClients(clients);
    setActiveClient(d);
    if (selectedProject) {
      var pd = loadProjectsData();
      var sp = pd.projects.find(function(x){ return x.id === selectedProject.id; });
      if (sp) {
        sp.crmClientId = d.client_id;
        sp.folderId = d.folderId || sp.folderId || '';
        sp.folderLink = d.folderLink || sp.folderLink || '';
        sp.crmData = makeProjectCrmSnapshot(d);
        saveProjectsData(pd);
        syncProjectToActiveSheet(sp.id, 'crm_save');
        rerenderProjectsPreserveScroll();
      }
    }
    
    var st = document.getElementById('crmSt');
    st.style.display = 'block';
    try {
      await writeToSheets(d);
      st.className = 'crm-st ok';
      st.innerHTML = '✓ Таблица обновлена · <a href="' + folderLink + '" target="_blank" style="color:#4fc;text-decoration:underline">' + cat.name + ' →</a>';
    } catch (sheetErr) {
      st.className = 'crm-st err';
      var errMsg = (sheetErr.message || String(sheetErr)).replace(/</g,'&lt;').replace(/"/g,'&quot;');
      st.innerHTML = '✓ Папка: <a href="' + folderLink + '" target="_blank" style="color:#4fc">' + cat.name + ' →</a><br><span style="color:#ff8080">✗ Таблица: ' + errMsg + '</span>';
    }
  } catch(e) {
    var st = document.getElementById('crmSt');
    if (st) {
      st.style.display = 'block';
      st.className = 'crm-st err';
      st.textContent = '✗ ' + (e.message || String(e));
    }
  } finally {
    btn.disabled = false;
    btn.textContent = '💾 Сохранить';
  }
}

async function writeToSheets(d) {
  var token = _driveToken;
  if (!token) return;
  var row = [
    d.client_id || String(Date.now()),
    d.company || '',
    d.contact_name || '',
    d.telegram || '',
    d.avito_account || '',
    d.phone || '',
    d.client_type || '',
    d.folder_name || '',
    d.folderLink || ''
  ];
  var sheetName = (typeof SHEETS_NAME !== 'undefined' ? SHEETS_NAME : 'Лист1');
  var lookupRange = sheetName + '!A2:F';
  var lookupUrl = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEETS_ID + '/values/' + encodeURIComponent(lookupRange);
  var colAResp = await fetch(lookupUrl, { headers: {'Authorization': 'Bearer ' + token} });
  var targetRow = 0;
  if (colAResp.ok) {
    var colAData = await colAResp.json().catch(function(){ return {}; });
    var vals = colAData.values || [];
    var dCompany = normClientField(d.company);
    var dContact = normClientField(d.contact_name);
    var dPhone = normClientField(d.phone);
    for (var i = 0; i < vals.length; i++) {
      var rid = vals[i] ? String(vals[i][0] || '') : '';
      if (rid && rid === String(d.client_id || '')) { targetRow = i + 2; break; }
      var rCompany = normClientField(vals[i] && vals[i][1]);
      var rContact = normClientField(vals[i] && vals[i][2]);
      var rPhone = normClientField(vals[i] && vals[i][5]);
      if (!targetRow && dCompany && ((dContact && dCompany === rCompany && dContact === rContact) || (dPhone && dCompany === rCompany && dPhone === rPhone))) {
        targetRow = i + 2;
      }
    }
  }
  var resp;
  if (targetRow > 0) {
    var updRange = sheetName + '!A' + targetRow + ':I' + targetRow;
    var updUrl = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEETS_ID + '/values/' + encodeURIComponent(updRange) + '?valueInputOption=USER_ENTERED';
    resp = await fetch(updUrl, {
      method: 'PUT',
      headers: {'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json'},
      body: JSON.stringify({values: [row]})
    });
  } else {
    var appRange = sheetName + '!A:I';
    var appUrl = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEETS_ID + '/values/' + encodeURIComponent(appRange) + ':append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS';
    resp = await fetch(appUrl, {
      method: 'POST',
      headers: {'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json'},
      body: JSON.stringify({values: [row]})
    });
  }
  if (!resp.ok) {
    var err = await resp.json().catch(function() { return {}; });
    throw new Error('Таблица: ' + (err.error && err.error.message ? err.error.message : resp.status + ' ' + resp.statusText));
  }
}

document.addEventListener('DOMContentLoaded', function() {
  updateDriveUI();
  // Рандомные name на контактных полях — Chrome не автозаполняет
  ['company','contact_name','tg','phone'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.setAttribute('name', 'f_' + Math.random().toString(36).slice(2));
  });
  // Загружаем сохранённый API ключ
  var savedKey = localStorage.getItem('avito_api_key');
  if (savedKey) {
    var ki = document.getElementById('apiKeyInput');
    if (ki) ki.value = savedKey;
  }
  // Загружаем кастомные KP теги
  var customKP = JSON.parse(localStorage.getItem('avito_kp_custom') || '[]');
  customKP.forEach(function(val) { addKPTag(val); });
  initKP();
  initAC();
  initSecBar();
  switchTab('analysis');
  applyAnalyticsModeDefault();
  // Восстанавливаем активного клиента
  _activeClient = getActiveClient();
  updateClientBadge();
  if (_activeClient) loadClient(-1); // -1 = load from _activeClient
  updateProjectsSidebarOffset();
  window.addEventListener('resize', updateProjectsSidebarOffset);
  document.addEventListener('visibilitychange', function() {
    if (!projectsMode) return;
    if (document.hidden) {
      stopProjectsSheetPullTimer();
      stopProjectsDayShiftTimer();
    } else {
      startProjectsSheetPullTimer();
      startProjectsDayShiftTimer();
    }
  });
  document.addEventListener('mouseup', finishCalendarPaint);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      _calendarPaintMode = null;
      _calendarPainting = false;
      document.body.classList.remove('calendar-launch-mode');
      hideProjectsCalMenu();
      document.querySelectorAll('.projects-cal-day.cal-launch-preview, .projects-cal-day.cal-launch-preview-last').forEach(function(el) {
        el.classList.remove('cal-launch-preview', 'cal-launch-preview-last');
      });
    }
  });
  // Закрытие меню клиентов при клике вне
  document.addEventListener('click', function(e) {
    var menu = document.getElementById('clientMenu');
    if (menu && menu.classList.contains('show') && !e.target.closest('.client-menu') && !e.target.closest('.crm-row')) {
      menu.classList.remove('show');
    }
  });
  // Клик по папке в CRM — в фазе capture, stopPropagation: переход во вложенные папки работает (успех зафиксирован)
  var crmMenu = document.getElementById('clientMenu');
  if (crmMenu) {
    crmMenu.addEventListener('click', function(e) {
      var item = e.target.closest('.client-item[data-folder-id]');
      if (!item) return;
      e.preventDefault();
      e.stopPropagation();
      var id = item.getAttribute('data-folder-id');
      var name = item.getAttribute('data-folder-name') || '';
      if (id) enterFolder(id, name);
    }, true);
  }
});
